<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f5fbff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="月度口袋" />
    <title>月度口袋</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/app-icon.svg" />
    <link rel="icon" href="icons/app-icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="月度口袋记账">
      <section class="summary-panel" id="summaryPanel" aria-label="总览">
        <div class="summary-metrics">
          <div class="summary-metric">
            <span>当日已用</span>
            <strong id="todaySpentAmount">¥0</strong>
          </div>
          <div class="summary-metric">
            <span>当月已用</span>
            <strong id="monthlySpentAmount">¥0</strong>
          </div>
          <div class="summary-metric">
            <span class="summary-label-stack">
              <span>剩余日均</span>
              <small id="remainingDaysLabel">剩余0 d</small>
            </span>
            <strong id="dailyAverageRemaining">¥0</strong>
          </div>
        </div>
        <div class="summary-track" aria-hidden="true">
          <span class="summary-segment summary-fixed" id="summaryFixed"></span>
          <span class="summary-segment summary-saving" id="summarySaving"></span>
          <span class="summary-segment summary-daily" id="summaryDaily"></span>
        </div>
      </section>

      <section class="fund-list" id="fundList" aria-label="资金用途列表"></section>
      <section class="details-list" id="detailsView" aria-label="支出明细" hidden></section>
      <section class="cloud-view" id="cloudView" aria-label="云端同步" hidden>
        <form class="cloud-form" id="cloudForm">
          <div class="page-heading">
            <p class="eyebrow">云端同步</p>
            <h2 id="cloudStatus">未登录</h2>
          </div>
          <div class="cloud-auth-panel" id="cloudAuthPanel">
            <label class="input-group">
              <span>邮箱</span>
              <input id="cloudEmail" autocomplete="email" inputmode="email" type="email" />
            </label>
            <label class="input-group">
              <span>密码</span>
              <input id="cloudPassword" autocomplete="current-password" type="password" />
            </label>
            <button class="primary-button" id="cloudAuth" type="submit">注册/登录</button>
          </div>
          <div class="cloud-actions" id="cloudSyncPanel" hidden>
            <button class="secondary-button" id="cloudPush" type="button">同步到云端</button>
            <button class="secondary-button" id="cloudPull" type="button">从云端恢复</button>
            <button class="danger-button" id="cloudSignOut" type="button">退出登录</button>
          </div>
        </form>
      </section>
      <section class="settings-view" id="settingsView" aria-label="预算设置" hidden>
        <form class="settings-form" id="settingsForm">
          <div class="page-heading">
            <p class="eyebrow">预算设置</p>
            <h2>分配本月收入</h2>
          </div>
          <label class="input-group">
            <span>当月总收入</span>
            <input id="incomeInput" inputmode="decimal" min="0" step="any" type="number" required />
          </label>
          <div class="setting-summary">
            <span id="percentSummary">已分配 0%</span>
            <span id="amountSummary">预算 ¥0</span>
          </div>
          <label class="setting-toggle">
            <span>明细聚合</span>
            <input id="detailsGroupToggle" type="checkbox" />
          </label>
          <div class="budget-editor" id="budgetEditor"></div>
          <button class="add-button" id="addFund" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5v14M5 12h14" />
            </svg>
            添加用途
          </button>
          <button class="danger-button" id="resetState" type="button">恢复初始状态</button>
          <menu class="dialog-actions settings-actions">
            <button class="primary-button" id="saveSettings" value="default" type="submit">保存</button>
          </menu>
        </form>
      </section>

      <nav class="bottom-tabs" id="bottomTabs" aria-label="页面导航">
        <button class="tab-button active" type="button" data-view="budget" aria-label="预算余额">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 7.5A2.5 2.5 0 0 1 6.5 5h11A2.5 2.5 0 0 1 20 7.5v9A2.5 2.5 0 0 1 17.5 19h-11A2.5 2.5 0 0 1 4 16.5v-9Z" />
            <path d="M15 12.25h5V16h-5.25a1.88 1.88 0 0 1 0-3.75H15Z" />
          </svg>
        </button>
        <button class="tab-button" type="button" data-view="details" aria-label="支出明细">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 4h10a2 2 0 0 1 2 2v14l-3-2-3 2-3-2-3 2-2-1.34V6a2 2 0 0 1 2-2Z" />
            <path d="M9 9h6M9 13h6" />
          </svg>
        </button>
        <button class="tab-button" type="button" data-view="cloud" aria-label="云端">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7.5 18.5h9.25a4 4 0 0 0 .74-7.93A5.5 5.5 0 0 0 6.88 9.1 4.75 4.75 0 0 0 7.5 18.5Z" />
            <path d="M9 14.5h6M12 11.5v6" />
          </svg>
        </button>
        <button class="tab-button" type="button" data-view="settings" aria-label="设置">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
            <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.05.05a2.05 2.05 0 0 1-2.9 2.9l-.05-.05A1.7 1.7 0 0 0 15 19.43a1.7 1.7 0 0 0-1 .57 1.7 1.7 0 0 0-.34 1.08V21a2.05 2.05 0 1 1-4.1 0v-.08A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.88.34l-.05.05a2.05 2.05 0 1 1-2.9-2.9l.05-.05A1.7 1.7 0 0 0 4.57 15a1.7 1.7 0 0 0-1.56-1H3a2.05 2.05 0 1 1 0-4.1h.08A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.34-1.88l-.05-.05a2.05 2.05 0 1 1 2.9-2.9l.05.05A1.7 1.7 0 0 0 9 4.57a1.7 1.7 0 0 0 1-.57 1.7 1.7 0 0 0 .34-1.08V3a2.05 2.05 0 1 1 4.1 0v.08A1.7 1.7 0 0 0 15 4.6a1.7 1.7 0 0 0 1.88-.34l.05-.05a2.05 2.05 0 1 1 2.9 2.9l-.05.05A1.7 1.7 0 0 0 19.43 9c.1.37.3.7.57 1 .31.31.72.48 1.16.48H21a2.05 2.05 0 1 1 0 4.1h-.08A1.7 1.7 0 0 0 19.4 15Z" />
          </svg>
        </button>
      </nav>
    </main>

    <dialog class="sheet" id="expenseDialog" aria-labelledby="expenseTitle">
      <form method="dialog" id="expenseForm">
        <div class="sheet-header">
          <div>
            <p class="eyebrow">快速记一笔</p>
            <h2 id="expenseTitle">记录支出</h2>
          </div>
          <button class="icon-button subtle" value="cancel" type="submit" formnovalidate aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m6 6 12 12M18 6 6 18" />
            </svg>
          </button>
        </div>
        <label class="input-group">
          <span>金额</span>
          <input id="expenseAmount" inputmode="decimal" min="0" step="0.01" type="number" placeholder="0.00" required />
        </label>
        <div class="preset-grid" id="presetGrid" aria-label="常用金额"></div>
        <div class="expense-category-grid" id="expenseCategoryGrid" aria-label="支出类别"></div>
        <menu class="dialog-actions">
          <button class="primary-button" id="saveExpense" value="default" type="submit">记账</button>
        </menu>
      </form>
    </dialog>

    <dialog class="sheet" id="historyDialog" aria-labelledby="historyTitle">
      <form method="dialog" id="historyForm">
        <div class="sheet-header">
          <div>
            <p class="eyebrow">修改明细</p>
            <h2 id="historyTitle">支出明细</h2>
          </div>
          <button class="icon-button subtle" value="cancel" type="submit" formnovalidate aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m6 6 12 12M18 6 6 18" />
            </svg>
          </button>
        </div>
        <label class="input-group">
          <span>金额</span>
          <input id="historyAmount" inputmode="decimal" step="any" type="number" placeholder="0.00" required />
        </label>
        <div class="expense-category-grid" id="historyCategoryGrid" aria-label="支出类别"></div>
        <menu class="dialog-actions">
          <button class="danger-button" id="deleteHistory" value="delete" type="submit" formnovalidate>删除</button>
          <button class="primary-button" id="saveHistory" value="default" type="submit">保存</button>
        </menu>
      </form>
    </dialog>

    <dialog class="sheet" id="spentDialog" aria-labelledby="spentTitle">
      <form method="dialog" id="spentForm">
        <div class="sheet-header">
          <div>
            <p class="eyebrow">调整已用</p>
            <h2 id="spentTitle">已用金额</h2>
          </div>
          <button class="icon-button subtle" value="cancel" type="submit" formnovalidate aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m6 6 12 12M18 6 6 18" />
            </svg>
          </button>
        </div>
        <p class="dialog-hint" id="spentHint">输入该用途当前已经使用的金额。</p>
        <label class="input-group">
          <span>已用金额</span>
          <input id="spentAmount" inputmode="decimal" min="0" step="0.01" type="number" placeholder="0.00" required />
        </label>
        <menu class="dialog-actions">
          <button class="secondary-button" value="cancel" type="submit" formnovalidate>取消</button>
          <button class="primary-button" id="saveSpent" value="default" type="submit">保存</button>
        </menu>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script type="module" src="app.js"></script>
  </body>
</html>
